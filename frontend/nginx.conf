server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API and Socket.IO are routed by Traefik directly to team-api (priority 100).
    # These blocks are fallback-only — return a clean error if requests somehow
    # reach Nginx instead of Traefik. No DNS resolution needed (avoids
    # "team-api could not be resolved" errors when the backend restarts).
    location /api/ {
        default_type application/json;
        return 502 '{"error": "Backend temporarily unavailable", "retry": true}';
    }

    location /socket.io/ {
        default_type application/json;
        return 502 '{"error": "Backend temporarily unavailable", "retry": true}';
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
